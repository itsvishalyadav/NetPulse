<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetPulse — Network Performance Monitoring System</title>
  <meta name="description" content="A comprehensive network performance monitoring system with real-time metrics, speed testing, packet loss monitoring, and beautiful visualizations." />
  <link rel="icon" type="image/svg+xml" href="/netpulse-icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Loader -->
  <div id="app-loader">
    <div class="loader-content">
      <div class="pulse-ring"></div>
      <div class="pulse-ring delay-1"></div>
      <div class="pulse-ring delay-2"></div>
      <svg class="loader-icon" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="20" stroke="url(#loaderGrad)" stroke-width="2.5" fill="none" />
        <path d="M14 24 L20 18 L26 26 L34 16" stroke="url(#loaderGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        <defs><linearGradient id="loaderGrad" x1="0" y1="0" x2="48" y2="48"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs>
      </svg>
      <p class="loader-text">Initializing NetPulse...</p>
    </div>
  </div>

  <!-- App Shell -->
  <div id="app" class="app-container hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="logo-group">
          <svg class="logo-icon" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="18" stroke="url(#logoGrad)" stroke-width="2" fill="none"/>
            <path d="M10 22 L16 16 L22 24 L30 12" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <defs><linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40"><stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs>
          </svg>
          <div class="logo-text">
            <span class="logo-name">NetPulse</span>
            <span class="logo-sub">Network Monitor</span>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Nav items injected by JS -->
      </nav>
      <div class="sidebar-footer">
        <div class="connection-status" id="connection-status">
          <span class="status-dot online"></span>
          <span class="status-text">System Online</span>
        </div>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Header Bar -->
      <header class="top-bar">
        <button class="hamburger" id="hamburger-btn" aria-label="Toggle sidebar">
          <span></span><span></span><span></span>
        </button>
        <div class="top-bar-left">
          <h1 id="page-title" class="page-title">Dashboard</h1>
        </div>
        <div class="top-bar-right">
          <div class="live-clock" id="live-clock"></div>
        </div>
      </header>

      <!-- Page Container -->
      <div class="page-container" id="page-container">
        <!-- Dynamic page content injected here -->
      </div>
    </main>
  </div>

  <!-- Alert Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="/main.js"></script>
</body>
</html>
